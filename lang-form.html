  <main>

<input type="hidden" name="formType" value="Language Academy">

    event.preventDefault();
    event.stopImmediatePropagation();

    if (!SCRIPT_URL || SCRIPT_URL.indexOf('PASTE_YOUR_APPS_SCRIPT') !== -1) {
      alert(isArabic() ? '    Google Apps Script .' : 'Please paste your Google Apps Script Web App URL first.');
      return;
    }

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    var button = cfg.button ? form.querySelector(cfg.button) || document.querySelector(cfg.button) : form.querySelector('button[type="submit"]');
    var buttonText = cfg.buttonText ? document.querySelector(cfg.buttonText) : null;
    var feedback = cfg.feedback ? document.querySelector(cfg.feedback) : null;
    var oldButtonText = buttonText ? buttonText.textContent : (button ? button.textContent : '');
    var submittingText = isArabic() ? ' ...' : 'Submitting...';

    if (button) {
      button.disabled = true;
      button.classList.add('loading');
      if (!buttonText) button.textContent = submittingText;
    }
    if (buttonText) buttonText.textContent = submittingText;
    setFeedback(feedback, '', '');

    try {
      var payload = normalisePayload(form, cfg);
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
      });
      setFeedback(feedback, 'success', isArabic() ? cfg.successAr : cfg.successEn);
      form.reset();
    } catch (error) {
      setFeedback(feedback, 'error', isArabic() ? '   .   .' : 'Something went wrong. Please try again.');
    } finally {
      if (button) {
        button.disabled = false;
        button.classList.remove('loading');
        if (!buttonText && oldButtonText) button.textContent = oldButtonText;
      }
      if (buttonText) buttonText.textContent = oldButtonText || (isArabic() ? '' : 'Submit');
    }
  }

  configs.forEach(function (cfg) {
    var form = document.getElementById(cfg.formId);
    if (!form) return;
    if (!form.querySelector('input[name="formType"]')) {
      var hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.name = 'formType';
      hidden.value = cfg.formType;
      form.insertBefore(hidden, form.firstChild);
    }
    form.addEventListener('submit', submitToGoogleSheets.bind(null, form, cfg), true);
  });
})();
</script>

  function fromHrefToRoute(href) {
    if (!href) return '';
    href = String(href).trim();
    if (!href) return '';
    if (href.indexOf('javascript:') === 0 || href.indexOf('mailto:') === 0 || href.indexOf('tel:') === 0 || href.indexOf('#') === 0) {
      return '';
    }
    if (href.indexOf('http://') === 0 || href.indexOf('https://') === 0) {

    }
    if (href.charAt(0) === '/') {
      return href;
    }
    var clean = href.split('#')[0].split('?')[0].replace(/\\/g, '/');
    var parts = clean.split('/');
    var file = parts[parts.length - 1] || '';
    var base = file.replace(/\.html?$/i, '').toLowerCase();
    if (slugMap[base]) return slugMap[base];
    if (base) return '/' + base;
    return '';
  }
  function resolveRoute(a) {
    var wix = (a.getAttribute('data-wix-link') || '').trim();
    if (wix) {
      if (wix.charAt(0) === '/' || wix.indexOf('http://') === 0 || wix.indexOf('https://') === 0) return wix;
      if (wix.indexOf('.html') > -1) return fromHrefToRoute(wix);
    }
    var href = a.getAttribute('href') || '';
    return fromHrefToRoute(href);
  }
  function normalizeInternalLinks() {
    var anchors = document.querySelectorAll('a[href], a[data-local-link], a[data-wix-link]');
    anchors.forEach(function(a){
      var route = resolveRoute(a);
      if (route && route.charAt(0) === '/') {
        a.setAttribute('data-wix-link', route);
      }
    });
  }
  document.addEventListener('click', function (event) {
    var a = event.target && event.target.closest ? event.target.closest('a') : null;
    if (!a) return;
    if (a.target === '_blank' || a.hasAttribute('download')) return;
    var route = resolveRoute(a);
    if (!route) return;
    event.preventDefault();
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'EACC_NAVIGATE', href: route }, '*');
      } else {
        window.location.href = route;
      }
    } catch (e) {
      window.location.href = route;
    }
  }, true);
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', normalizeInternalLinks);
  } else {
    normalizeInternalLinks();
  }
})();
